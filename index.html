<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>居家管理 - 存貨與清潔</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <nav class="app-nav">
      <h1 class="app-title">居家管理</h1>
      <div class="nav-tabs">
        <button data-tab="dashboard" class="active">🏠 總覽</button>
        <button data-tab="inventory">📦 存貨</button>
        <button data-tab="cleaning">🧹 清潔</button>
      </div>
    </nav>

    <main class="app-main">
      <!-- 總覽 -->
      <section id="dashboard" class="tab-panel active">
        <div class="dashboard-view">
          <h2>🏠 居家管理總覽</h2>
          <div class="dashboard-grid">
            <section class="dashboard-card alert" id="low-stock-card">
              <h3>⚠️ 需補貨 (<span id="low-stock-count">0</span>)</h3>
              <ul id="low-stock-list"></ul>
            </section>
            <section class="dashboard-card alert" id="overdue-card">
              <h3>🧹 逾期清潔 (<span id="overdue-count">0</span>)</h3>
              <ul id="overdue-list"></ul>
            </section>
            <section class="dashboard-card" id="due-soon-card">
              <h3>📅 即將到期清潔</h3>
              <ul id="due-soon-list"></ul>
            </section>
            <section class="dashboard-card stats">
              <h3>📊 統計</h3>
              <div class="stat-row"><span>存貨品項</span><strong id="stat-items">0</strong></div>
              <div class="stat-row"><span>清潔任務</span><strong id="stat-tasks">0</strong></div>
            </section>
          </div>
        </div>
      </section>

      <!-- 存貨 -->
      <section id="inventory" class="tab-panel">
        <div class="inventory-view">
          <header class="inventory-header">
            <h2>📦 存貨管理</h2>
            <div class="inventory-filters">
              <input type="text" id="inv-search" placeholder="搜尋品項..." class="filter-input" />
              <select id="inv-category" class="filter-select">
                <option value="">全部分類</option>
              </select>
              <input type="text" id="inv-location" placeholder="存放位置" class="filter-input short" />
              <label class="filter-checkbox">
                <input type="checkbox" id="inv-low-stock" />
                僅顯示需補貨 <span class="badge" id="inv-low-badge" style="display:none">0</span>
              </label>
            </div>
            <button class="btn-primary" id="btn-add-inv">+ 新增品項</button>
          </header>
          <div class="inventory-content">
            <div id="inv-list" class="item-grid"></div>
            <p id="inv-empty" class="empty-state">尚無存貨紀錄，點擊「新增品項」開始記錄</p>
          </div>
        </div>
      </section>

      <!-- 清潔 -->
      <section id="cleaning" class="tab-panel">
        <div class="cleaning-view">
          <header class="cleaning-header">
            <h2>🧹 清潔工作</h2>
            <button class="btn-primary" id="btn-add-clean">+ 新增清潔任務</button>
          </header>
          <div class="cleaning-content">
            <div id="clean-list" class="task-list"></div>
            <p id="clean-empty" class="empty-state">尚無清潔任務，點擊「新增清潔任務」開始設定</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 新增存貨 Modal -->
  <div id="modal-inv" class="modal-overlay" style="display:none">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>新增存貨</h3>
      <div class="form-grid">
        <label>品名 *</label>
        <input type="text" id="inv-name" placeholder="例：衛生紙" />
        <label>分類 *</label>
        <select id="inv-cat-select"></select>
        <label>數量</label>
        <input type="number" id="inv-qty" min="0" value="1" />
        <label>單位</label>
        <select id="inv-unit">
          <option value="個">個</option>
          <option value="包">包</option>
          <option value="瓶">瓶</option>
          <option value="罐">罐</option>
          <option value="盒">盒</option>
          <option value="袋">袋</option>
          <option value="片">片</option>
          <option value="條">條</option>
          <option value="克">克</option>
          <option value="毫升">毫升</option>
        </select>
        <label>存放位置</label>
        <input type="text" id="inv-loc" placeholder="例：廚房櫃子、浴室" list="location-datalist" />
        <datalist id="location-datalist"></datalist>
        <label>最低庫存提醒</label>
        <input type="number" id="inv-min" min="0" placeholder="選填" />
        <label>到期日</label>
        <input type="date" id="inv-expiry" />
      </div>
      <div class="modal-actions">
        <button onClick="closeModal('modal-inv')">取消</button>
        <button class="btn-primary" id="btn-inv-submit">新增</button>
      </div>
    </div>
  </div>

  <!-- 新增清潔 Modal -->
  <div id="modal-clean" class="modal-overlay" style="display:none">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>新增清潔任務</h3>
      <div class="form-grid">
        <label>任務名稱 *</label>
        <input type="text" id="clean-name" placeholder="例：廚房清潔" />
        <label>區域</label>
        <input type="text" id="clean-area" placeholder="例：廚房、浴室" />
        <label>頻率</label>
        <select id="clean-freq">
          <option value="daily">每日</option>
          <option value="weekly">每週</option>
          <option value="biweekly">每兩週</option>
          <option value="monthly">每月</option>
          <option value="quarterly">每季</option>
          <option value="custom">自訂</option>
        </select>
        <label id="clean-custom-label" style="display:none">天數</label>
        <input type="number" id="clean-custom-days" min="1" value="7" style="display:none" />
        <label>細項清單</label>
        <div class="subtask-input">
          <input type="text" id="clean-subtask" placeholder="新增細項..." />
          <button type="button" id="btn-add-subtask">+</button>
        </div>
      </div>
      <ul id="clean-subtask-list" class="subtask-list"></ul>
      <div class="modal-actions">
        <button onClick="closeModal('modal-clean')">取消</button>
        <button class="btn-primary" id="btn-clean-submit">新增</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
